<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Donasi - Aksi Nurani</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="asset/JAksiNurani.png" class="logo">
            <h1>Aksi Nurani</h1>
        </div>
        <nav><a href="index.html">Home</a></nav>
    </header>

    <main style="max-width: 600px; margin: auto; padding: 20px;">
        <h3>Formulir Donasi: Renovasi Sekolah Pelosok [cite: 68]</h3>
        <form onsubmit="alert('Berhasil melakukan donasi! [cite: 93]'); return true;">
            <label>Nama Lengkap:</label><br>
            <input type="text" style="width:100%; margin-bottom:15px;" required><br>
            
            <label>Email:</label><br>
            <input type="email" style="width:100%; margin-bottom:15px;" required><br>
            
            <label>Nominal Donasi:</label><br>
            <input type="number" style="width:100%; margin-bottom:15px;" required><br>
            
            <label>Bukti Transfer (PDF/JPG/PNG):</label><br>
            <input type="file" accept=".pdf,.jpg,.png" style="margin-bottom:20px;" required><br>
            
            <button type="submit" class="btn-donasi" style="width:100%; border:none; cursor:pointer;">Kirim Donasi</button>
        </form>
    </main>
</body>
</html>
