<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Donasi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="asset/logo aksi nurani.png" alt="logo">
            <h1>Aksi Nurani</h1>
        </div>

        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="index.html">Login</a>
        </nav>
    </header>

    <main>
        <h2>Form Donasi</h2>

        <form>
            <label for="nama">Nama</label><br>
            <input id="nama" name="nama" type="text" placeholder="Masukkan nama kamu" required><br><br>

            <label for="email">Email</label><br>
            <input id="email" name="email" type="email" placeholder="Masukkan email" required><br><br>

            <label for="nominal">Nominal Donasi</label><br>
            <input id="nominal" name="nominal" type="number" placeholder="Contoh: 10000" required><br><br>

            <label for="kategori">Kategori</label><br>
            <select id="kategori" name="kategori" required>
                <option value="">Pilih</option>
                <option>Pendidikan</option>
                <option>Kesehatan</option>
                <option>Bencana Alam</option>
                <option>Lingkungan</option>
                <option>Sosial dan Kemanusiaan</option>
            </select><br><br>

            <label for="pesan">Pesan</label><br>
            <textarea id="pesan" name="pesan"></textarea><br><br>

            <button type="submit">Donasi Sekarang</button>
        </form>
    </main>
    
</body>
</html>
