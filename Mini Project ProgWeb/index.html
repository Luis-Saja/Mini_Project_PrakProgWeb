<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Aksi Nurani - Beranda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="asset/JAksiNurani.png" class="logo">
            <h1>Aksi Nurani</h1>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Bantu Sesama Hari Ini</h1>
            <div class="search-container">
                <input type="text" placeholder="Judul Kampanye">
                <select>
                    <option>Pilih Kategori</option>
                    <option>Pendidikan</option>
                    <option>Kesehatan</option>
                </select>
                <input type="text" placeholder="Lokasi">
                <input type="number" placeholder="Target Dana">
                <button type="button">Cari</button>
            </div>
        </section>

        <section class="campaign-grid">
            <article class="card">
                <img src="asset/dummy-poster.jpg" alt="Poster">
                <div class="card-content">
                    <h3>Renovasi Sekolah Pelosok</h3>
                    <p>Penyelenggara: Yayasan Bakti</p>
                    <p>Target: <strong>Rp 50.000.000</strong></p>
                    <p>Deadline: 12 Des 2025</p>
                    <a href="detail.html" class="btn-donasi">Lihat Detail</a>
                </div>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Aksi Nurani - Sistem Crowdfunding Sosial</p>
    </footer>
</body>
</html>
